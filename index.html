<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="Đăng nhập vào AnSchool - Nền tảng học tiếng Anh qua trò chơi tương tác dành cho trẻ em.">
  <title>Đăng nhập - AnSchool</title>
  <script>
    window.location.replace('choosegame.html' + window.location.search + window.location.hash);
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0;url=choosegame.html">
  </noscript>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #16a34a;
      --primary-dark: #15803d;
      --primary-light: #4ade80;
      --accent: #f59e0b;
      --accent2: #10b981;
      --text-dark: #14532d;
      --text-muted: #166534;
      --bg-page: #f0fdf4;
      --card-bg: #ffffff;
      --radius-xl: 36px;
      --radius-lg: 24px;
      --radius-md: 16px;
      --shadow-card: 0 25px 50px -12px rgba(22, 163, 74, 0.25);
      --shadow-btn: 0 10px 25px -5px rgba(245, 158, 11, 0.5);
      --login-bg-image: linear-gradient(180deg, rgba(229, 255, 214, 0.98), rgba(200, 245, 179, 0.96));
    }

    html {
      height: 100%;
    }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
      isolation: isolate;
      background: #d9f7c7;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image: var(--login-bg-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(180deg, rgba(223, 255, 213, 0.72), rgba(241, 253, 233, 0.88));
      pointer-events: none;
    }

    .shape {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      animation: floatShape 6s ease-in-out infinite alternate;
      filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.1));
    }

    .shape-1 {
      font-size: clamp(40px, 6vw, 80px);
      top: 10%;
      right: 10%;
      animation-delay: 0s;
    }

    .shape-2 {
      font-size: clamp(30px, 5vw, 60px);
      bottom: 15%;
      left: 8%;
      animation-delay: 2s;
    }

    .shape-3 {
      font-size: clamp(35px, 5.5vw, 70px);
      top: 50%;
      right: 5%;
      animation-delay: 4s;
    }

    .shape-4 {
      font-size: clamp(30px, 5vw, 60px);
      top: 15%;
      left: 15%;
      animation-delay: 1s;
    }

    @keyframes floatShape {
      from {
        transform: translateY(0) rotate(0deg);
      }

      to {
        transform: translateY(-15px) rotate(8deg);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .container {
      width: min(1180px, 100%);
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      border-radius: 34px;
      overflow: hidden;
      box-shadow: var(--shadow-card);
      background: rgba(255, 255, 255, 0.96);
      position: relative;
      z-index: 1;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .hero-panel {
      min-height: 700px;
      padding: 58px 50px;
      background: linear-gradient(180deg, #179a48 0%, #27ad57 48%, #1f9d4a 100%);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      isolation: isolate;
      overflow: hidden;
    }

    .hero-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 20%, rgba(255, 255, 255, 0.16) 0 17%, transparent 18%),
        radial-gradient(circle at 82% 12%, rgba(255, 255, 255, 0.12) 0 13%, transparent 14%),
        radial-gradient(circle at 80% 76%, rgba(255, 255, 255, 0.12) 0 10%, transparent 11%);
      pointer-events: none;
    }

    .brand-badge {
      width: 282px;
      height: 282px;
      border-radius: 50%;
      margin: 0 auto 34px;
      background: #f6e96a;
      display: grid;
      place-items: center;
      box-shadow: inset 0 0 0 12px rgba(255, 255, 255, 0.08);
      position: relative;
      z-index: 1;
    }

    .brand-badge img {
      width: 90%;
      height: 90%;
      object-fit: contain;
      transform: translateY(2px);
    }

    .hero-copy {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .hero-copy h1 {
      font-size: clamp(2.3rem, 3.9vw, 3.3rem);
      line-height: 1.05;
      margin-bottom: 14px;
      letter-spacing: -0.03em;
      font-weight: 900;
    }

    .hero-copy p {
      font-size: clamp(0.98rem, 1.25vw, 1.08rem);
      opacity: 0.92;
      max-width: 520px;
      margin: 0 auto 34px;
      line-height: 1.6;
    }

    .feature-list {
      list-style: none;
      display: grid;
      gap: 18px;
      max-width: 420px;
      margin: 0 auto;
      text-align: left;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(8px);
      font-weight: 800;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .feature-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.16);
      display: grid;
      place-items: center;
      font-size: 1.2rem;
      flex: 0 0 auto;
    }

    .form-panel {
      min-height: 700px;
      padding: 60px 54px;
      background: rgba(255, 255, 255, 0.97);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .form-card {
      width: min(100%, 430px);
    }

    .form-card h2 {
      color: var(--primary);
      font-size: clamp(2.05rem, 2.9vw, 2.85rem);
      line-height: 1.1;
      margin-bottom: 10px;
      text-align: center;
      font-weight: 900;
    }

    .form-card .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.98rem;
      margin-bottom: 34px;
      font-weight: 700;
    }

    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      color: var(--text-muted);
      font-weight: 800;
      font-size: 0.98rem;
    }

    .input-wrap {
      position: relative;
    }

    .field input {
      width: 100%;
      border: 2px solid #c8d5e8;
      background: #ecf3ff;
      border-radius: 14px;
      padding: 17px 56px 17px 18px;
      font-size: 1rem;
      font-family: inherit;
      color: #0f172a;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.12);
      transform: translateY(-1px);
    }

    .toggle-pass {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      background: transparent;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      color: #64748b;
      padding: 4px;
    }

    .submit-btn {
      width: 100%;
      border: 0;
      border-radius: 26px;
      padding: 18px 20px;
      margin-top: 8px;
      font: inherit;
      font-size: 1.04rem;
      font-weight: 900;
      letter-spacing: 0.02em;
      color: white;
      background: linear-gradient(180deg, #ffbf35, #f59e0b);
      box-shadow: var(--shadow-btn), inset 0 -4px 0 rgba(180, 83, 9, 0.28);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.02);
    }

    .submit-btn:disabled {
      cursor: wait;
      opacity: 0.75;
      transform: none;
    }

    .status {
      margin-top: 16px;
      min-height: 24px;
      text-align: center;
      font-weight: 800;
      color: var(--primary-dark);
    }

    .status.error {
      color: #b91c1c;
    }

    .pager-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 18px;
    }

    .pager-dots span {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #cbd5e1;
    }

    .pager-dots span.active {
      width: 24px;
      background: linear-gradient(90deg, #ffb703, #fb8500);
    }

    @media (max-width: 1100px) {
      .container {
        grid-template-columns: 1fr;
      }

      .hero-panel,
      .form-panel {
        min-height: auto;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .container {
        border-radius: 28px;
      }

      .hero-panel,
      .form-panel {
        padding: 30px 18px;
      }

      .brand-badge {
        width: 220px;
        height: 220px;
      }

      .feature-list {
        gap: 12px;
      }

      .feature-item {
        font-size: 0.95rem;
      }
    }
  </style>
</head>

<body>
  <div class="shape shape-1">⭐</div>
  <div class="shape shape-2">🌷</div>
  <div class="shape shape-3">🚂</div>
  <div class="shape shape-4">🌿</div>

  <main class="container">
    <section class="hero-panel" aria-label="Giới thiệu AnSchool">
      <div class="brand-badge">
        <img src="https://drive.google.com/thumbnail?id=1GxMPO-OPxB0WuJrD9iJK1J4Jp6UaTtT6&sz=w800" alt="AnSchool Logo">
      </div>
      <div class="hero-copy">
        <h1>Học Vui Sáng Tạo</h1>
        <p>Cùng nhí khám phá thế giới tri thức với AnSchool nhé!</p>
        <ul class="feature-list">
          <li class="feature-item"><span class="feature-icon">🧩</span> Kho bài học siêu thú vị</li>
          <li class="feature-item"><span class="feature-icon">🎯</span> Chinh phục thử thách mỗi ngày</li>
          <li class="feature-item"><span class="feature-icon">🎮</span> Vừa học vừa chơi cực đã</li>
          <li class="feature-item"><span class="feature-icon">🏆</span> Rinh quà tặng siêu to</li>
        </ul>
      </div>
    </section>

    <section class="form-panel" aria-label="Đăng nhập">
      <div class="form-card">
        <h2>Đăng nhập</h2>
        <div class="subtitle">Nhập thông tin tài khoản để chơi ngay!</div>

        <form id="loginForm" novalidate>
          <div class="field">
            <label for="email">✉ Email của bé</label>
            <div class="input-wrap">
              <input id="email" name="email" type="email" autocomplete="username" placeholder="Nhập email" required>
            </div>
          </div>

          <div class="field">
            <label for="password">🔑 Mật khẩu</label>
            <div class="input-wrap">
              <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Nhập mật khẩu" required>
              <button type="button" class="toggle-pass" id="togglePass" aria-label="Hiện hoặc ẩn mật khẩu">👁</button>
            </div>
          </div>

          <button type="submit" class="submit-btn" id="submitBtn">VÀO GAME</button>
          <div class="status" id="statusText" aria-live="polite"></div>
          <div class="pager-dots" aria-hidden="true">
            <span></span>
            <span class="active"></span>
            <span></span>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyD2G7ROY58fHoKM6aPlZ9V9SqZ4g61Gf6-hS1kj2pf1uBNwRRw3A_x4We3av3ojyK_/exec';
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submitBtn');
    const statusText = document.getElementById('statusText');
    const togglePass = document.getElementById('togglePass');

    function applyLoginBackground(imageUrl) {
      const value = imageUrl && String(imageUrl).trim()
        ? `url("${String(imageUrl).trim()}")`
        : 'linear-gradient(180deg, rgba(229, 255, 214, 0.98), rgba(200, 245, 179, 0.96))';
      document.documentElement.style.setProperty('--login-bg-image', value);
    }

    const bgPromise = fetch(SCRIPT_URL + '?api=app.bootstrap').then(res => res.json()).catch(() => null);

    try {
      const savedEmail = localStorage.getItem('WW_LOGIN_EMAIL');
      if (savedEmail) emailInput.value = savedEmail;
    } catch (error) {
    }

    try {
      const localBoot = localStorage.getItem('WW_BOOTSTRAP');
      if (localBoot) {
        const cachedRes = JSON.parse(localBoot);
        if (cachedRes && cachedRes.gameBgImageUrl) {
          applyLoginBackground(cachedRes.gameBgImageUrl);
        }
      }
    } catch (error) {
    }

    bgPromise.then(data => {
      if (data && data.success) {
        try { localStorage.setItem('WW_BOOTSTRAP', JSON.stringify(data)); } catch (error) { }
        if (data.gameBgImageUrl) {
          applyLoginBackground(data.gameBgImageUrl);
        }
      }
    });

    togglePass.addEventListener('click', function () {
      const isHidden = passwordInput.type === 'password';
      passwordInput.type = isHidden ? 'text' : 'password';
      togglePass.textContent = isHidden ? '🙈' : '👁';
    });

    function setStatus(message, isError) {
      statusText.textContent = message || '';
      statusText.classList.toggle('error', Boolean(isError));
    }

    form.addEventListener('submit', async function (event) {
      event.preventDefault();

      const email = String(emailInput.value || '').trim();
      const password = String(passwordInput.value || '').trim();

      if (!email || !password) {
        setStatus('Vui lòng nhập đầy đủ email và mật khẩu.', true);
        return;
      }

      submitBtn.disabled = true;
      setStatus('Đang kiểm tra tài khoản...', false);

      try {
        const response = await fetch(
          SCRIPT_URL + '?api=auth.login&email=' + encodeURIComponent(email) + '&password=' + encodeURIComponent(password),
          { method: 'GET' }
        );
        const data = await response.json();

        if (data && data.success) {
          try {
            localStorage.setItem('WW_LOGIN_EMAIL', email);
            localStorage.setItem('WW_LOGIN_NAME', String(data.name || '').trim());
          } catch (error) {
          }
          setStatus('Đăng nhập thành công. Đang mở trang chọn game...', false);
          window.location.href = 'choosegame.html';
          return;
        }

        setStatus((data && data.message) ? data.message : 'Email hoặc mật khẩu không chính xác!', true);
      } catch (error) {
        setStatus('Không thể kết nối máy chủ đăng nhập.', true);
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>

</html>
