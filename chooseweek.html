<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AnSchool - Chọn tuần học trước khi vào game.">
  <title>AnSchool - Chọn Tuần</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #064e3b;
      --bg-2: #059669;
      --bg-3: #6ee7b7;
      --text: #064e3b;
      --primary: #059669;
      --game-bg-image: linear-gradient(180deg, rgba(229, 255, 214, 0.98), rgba(200, 245, 179, 0.96));
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: 'Lexend', system-ui, sans-serif;
      color: var(--text);
      min-height: 100vh;
      position: relative;
      background: #f0fdf4;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -2;
      background-image: var(--game-bg-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(180deg, rgba(240, 253, 244, 0.85), rgba(220, 252, 231, 0.95));
      pointer-events: none;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.25), 0 24px 50px rgba(6, 78, 59, 0.2), inset 0 2px 0 rgba(255, 255, 255, 1); }
      50% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0.15), 0 24px 50px rgba(6, 78, 59, 0.2), inset 0 2px 0 rgba(255, 255, 255, 1); }
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .shell {
      width: min(1100px, 100%);
      padding: clamp(24px, 4vw, 48px);
      border-radius: 40px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 1);
      box-shadow: 0 24px 64px rgba(6, 78, 59, 0.12), 0 8px 24px rgba(6, 78, 59, 0.08), inset 0 0 0 1px rgba(255, 255, 255, 0.5);
      overflow: hidden;
      position: relative;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .shell::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%; right: -50%; bottom: -50%;
      background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 60%);
      pointer-events: none;
      z-index: 0;
    }

    .hero {
      text-align: center;
      margin-bottom: 32px;
      position: relative;
      z-index: 1;
    }

    .brand-mark {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .brand-logo {
      width: min(220px, 55vw);
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 12px 24px rgba(6, 78, 59, 0.25));
      animation: float 6s ease-in-out infinite;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(209, 250, 229, 0.95), rgba(167, 243, 208, 0.95));
      border: 1px solid rgba(16, 185, 129, 0.3);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 13px;
      font-weight: 900;
      color: #047857;
      box-shadow: 0 4px 12px rgba(5, 150, 105, 0.1);
    }

    h1 {
      margin: 24px 0 12px;
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: #064e3b;
      text-shadow: 0 2px 10px rgba(255,255,255,0.8);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 20px;
      margin-top: 36px;
      position: relative;
      z-index: 1;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
      width: 100%;
      min-height: 190px;
      padding: 26px;
      border-radius: 32px;
      border: 2px solid rgba(255, 255, 255, 0.8);
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.95) 0%, rgba(240, 253, 244, 0.8) 100%);
      color: #064e3b;
      box-shadow: 0 12px 30px rgba(6, 78, 59, 0.08), inset 0 2px 0 rgba(255, 255, 255, 1);
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-align: left;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards;
    }

    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:nth-child(4) { animation-delay: 0.4s; }

    .card:hover {
      transform: translateY(-10px) scale(1.02);
      border-color: rgba(52, 211, 153, 0.6);
      box-shadow: 0 24px 50px rgba(6, 78, 59, 0.18), 0 8px 20px rgba(16, 185, 129, 0.15), inset 0 2px 0 rgba(255, 255, 255, 1);
      background: linear-gradient(145deg, rgba(255, 255, 255, 1) 0%, rgba(209, 250, 229, 0.95) 100%);
    }

    .card.active {
      transform: translateY(-8px) scale(1.02);
      border-color: #10b981;
      background: linear-gradient(145deg, rgba(255, 255, 255, 1) 0%, rgba(209, 250, 229, 1) 100%);
      animation: pulseGlow 2s infinite;
    }

    .badge-row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .tag {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      color: #059669;
      background: rgba(5, 150, 105, 0.12);
      padding: 6px 12px;
      border-radius: 999px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 58px;
      height: 58px;
      border-radius: 20px;
      font-weight: 900;
      font-size: 26px;
      color: white;
      box-shadow: 0 8px 16px rgba(6, 78, 59, 0.25), inset 0 2px 4px rgba(255, 255, 255, 0.5);
      border: 2px solid rgba(255, 255, 255, 0.6);
      text-shadow: 0 2px 4px rgba(0,0,0,0.15);
      transition: transform 0.3s ease;
    }

    .card:hover .badge {
      transform: scale(1.1) rotate(5deg);
    }

    .title {
      margin: 0;
      font-size: clamp(2rem, 3.5vw, 2.8rem);
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: #064e3b;
    }

    .desc {
      margin: 0;
      color: #065f46;
      line-height: 1.5;
      font-size: 1.05rem;
      font-weight: 500;
    }

    .footer {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(6, 78, 59, 0.12);
    }

    .footer-note {
      color: #065f46;
      font-size: 14px;
      line-height: 1.5;
    }

    .continue {
      border: 0;
      border-radius: 999px;
      padding: 14px 20px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: #ffffff;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(16, 185, 129, 0.28);
      transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease;
    }

    .continue:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 32px rgba(16, 185, 129, 0.36);
    }

    .continue:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .selected-line {
      font-size: 13px;
      font-weight: 800;
      color: #064e3b;
      min-height: 20px;
    }

    .pre11 .badge { background: linear-gradient(135deg, #10b981, #047857); }
    .pre12 .badge { background: linear-gradient(135deg, #34d399, #059669); }
    .pre2 .badge { background: linear-gradient(135deg, #6ee7b7, #10b981); }
    .pre3 .badge { background: linear-gradient(135deg, #a7f3d0, #34d399); }

    @media (max-width: 1024px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      .page { padding: 20px 14px; }
      .shell { border-radius: 32px; padding: 24px 16px; }
      h1 { font-size: 2rem; }
      .grid { grid-template-columns: 1fr; gap: 16px; }
      .card { min-height: 160px; padding: 20px; border-radius: 28px; }
      .footer { align-items: stretch; }
      .continue { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="shell">
      <div class="hero">
        <div class="brand-mark">
          <img src="https://drive.google.com/thumbnail?id=1GxMPO-OPxB0WuJrD9iJK1J4Jp6UaTtT6&sz=w800" alt="AnSchool Logo" class="brand-logo">
        </div>
        <div class="eyebrow">AnSchool</div>
        <h1>Chọn tuần học để vào game</h1>
      </div>

      <div class="grid" id="week-grid" style="grid-template-columns: repeat(2, minmax(0, 1fr)); max-width: 620px; margin: 24px auto 0;">
        <button type="button" class="card pre11" data-week-key="1" onclick="chooseWeek('1')">
          <div class="badge-row">
            <span class="badge">1</span>
            <span class="tag">Week</span>
          </div>
          <p class="title">Week 1 & 2</p>

        </button>

        <button type="button" class="card pre12" data-week-key="2" onclick="chooseWeek('2')">
          <div class="badge-row">
            <span class="badge">2</span>
            <span class="tag">Week</span>
          </div>
          <p class="title">Week 3 & 4</p>

        </button>
      </div>
      </section>
  </main>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyD2G7ROY58fHoKM6aPlZ9V9SqZ4g61Gf6-hS1kj2pf1uBNwRRw3A_x4We3av3ojyK_/exec';
    const WEEK_STORAGE_KEY = 'WW_SELECTED_WEEK';
    const WEEK_OPTIONS = {
      '1': { title: 'Tuần 1' },
      '2': { title: 'Tuần 2' }
    };

    const bgPromise = fetch(`${SCRIPT_URL}?api=app.bootstrap`).then(res => res.json()).catch(() => null);

    function applyGameBackground(imageUrl) {
      const value = imageUrl && String(imageUrl).trim()
        ? `url("${String(imageUrl).trim()}")`
        : 'linear-gradient(180deg, rgba(229, 255, 214, 0.98), rgba(200, 245, 179, 0.96))';
      document.documentElement.style.setProperty('--game-bg-image', value);
    }

    function normalizeWeekKey(value) {
      return String(value || '').trim().toLowerCase().replace(/\s+/g, '').replace(/[^a-z0-9]/g, '');
    }

    function getStoredWeek() {
      try {
        const queryWeek = new URLSearchParams(window.location.search).get('week') || '';
        const normalizedQueryWeek = normalizeWeekKey(queryWeek);
        if (normalizedQueryWeek) {
          localStorage.setItem(WEEK_STORAGE_KEY, normalizedQueryWeek);
          return normalizedQueryWeek;
        }

        return normalizeWeekKey(localStorage.getItem(WEEK_STORAGE_KEY) || '');
      } catch (error) {
        return '';
      }
    }

    function saveWeek(weekKey) {
      try {
        localStorage.setItem(WEEK_STORAGE_KEY, weekKey || '');
      } catch (error) {
      }
    }

    function setActiveCard(weekKey) {
      const normalizedKey = normalizeWeekKey(weekKey);
      document.querySelectorAll('[data-week-key]').forEach(card => {
        card.classList.toggle('active', normalizeWeekKey(card.dataset.weekKey || '') === normalizedKey);
      });
    }

    function chooseWeek(weekKey) {
      const normalizedKey = normalizeWeekKey(weekKey);
      if (!WEEK_OPTIONS[normalizedKey]) return;

      saveWeek(normalizedKey);
      setActiveCard(normalizedKey);
      window.location.href = `chooselevel.html?week=${encodeURIComponent(normalizedKey)}`;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const selectedWeek = getStoredWeek();
      if (selectedWeek) {
        setActiveCard(selectedWeek);
      }

      try {
        const localBoot = localStorage.getItem('WW_BOOTSTRAP');
        if (localBoot) {
          const cachedRes = JSON.parse(localBoot);
          if (cachedRes && cachedRes.gameBgImageUrl) {
            applyGameBackground(cachedRes.gameBgImageUrl);
          }
        }
      } catch (error) {
      }

      bgPromise.then(data => {
        if (data && data.success) {
          try { localStorage.setItem('WW_BOOTSTRAP', JSON.stringify(data)); } catch (error) {}
          if (data.gameBgImageUrl) {
            applyGameBackground(data.gameBgImageUrl);
          }
        }
      });
    });
  </script>
</body>
</html>
